name: Build Beta iOS App

on:
  push:
    branches: [ "beta" ]
  pull_request:
    branches: [ "beta" ]

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CLANG_MODULE_CACHE_PATH: /tmp/clang-module-cache

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        xcodebuild -version
        sudo xcode-select -p

    - name: Install Tools
      run: |
        brew install swiftlint
        brew install xcodegen || true

    - name: Run SwiftLint
      run: swiftlint lint
      continue-on-error: true

    - name: Debug Files
      run: ls -R

    - name: Cache SPM Packages
      uses: actions/cache@v4
      with:
        path: ComicToPDF/build/SourcePackages/checkouts
        key: ${{ runner.os }}-spm-${{ hashFiles('ComicToPDF/project.yml') }}
        restore-keys: |
          ${{ runner.os }}-spm-

    - name: Generate Project
      run: |
        cd ComicToPDF
        xcodegen generate

    - name: Build App
      run: |
        cd ComicToPDF
        xcodebuild -list -project InksyncPro.xcodeproj
        xcodebuild -project InksyncPro.xcodeproj \
                   -scheme InksyncPro \
                   -sdk iphoneos \
                   -configuration Release \
                   -derivedDataPath build \
                   CLANG_MODULE_CACHE_PATH=/tmp/clang-module-cache \
                   build \
                   CODE_SIGN_IDENTITY="" \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGNING_ALLOWED=NO

    - name: Package IPA
      run: |
        cd ComicToPDF
        mkdir Payload
        cp -r build/Build/Products/Release-iphoneos/InksyncPro.app Payload/
        zip -r InksyncPro_Beta_Unsigned.ipa Payload

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: InksyncPro_Beta_Unsigned_IPA
        path: ComicToPDF/InksyncPro_Beta_Unsigned.ipa
