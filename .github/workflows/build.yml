name: Build Native iOS App

on:
  push:
    branches: [ "main", "ios-port" ]
  pull_request:
    branches: [ "main", "ios-port" ]

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      XCODE_VERSION: ${{ steps.xcode-version.outputs.version }}

    steps:
    - uses: actions/checkout@v4

    - name: Get Xcode Version
      id: xcode-version
      run: echo "version=$(xcodebuild -version | head -1 | tr ' ' '_')" >> $GITHUB_OUTPUT
    
    - name: Install Tools
      run: |
        brew install swiftlint
        brew install xcodegen || true

    - name: Run SwiftLint
      run: swiftlint lint
      continue-on-error: true

    - name: Debug Files
      run: ls -R

    - name: Cache Xcode build and SPM
      uses: actions/cache@v4
      with:
        path: |
          ~/.build
          ComicToPDF/build/SourcePackages
        key: ${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-spm-${{ hashFiles('ComicToPDF/project.yml') }}
        restore-keys: |
          ${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-spm-

    - name: Generate Project
      run: |
        cd ComicToPDF
        xcodegen generate

    - name: Build App
      run: |
        cd ComicToPDF
        xcodebuild -list -project InksyncPro.xcodeproj
        # Clean first to prevent stale module cache (.pcm mtime) errors with new SDK runners
        xcodebuild -project InksyncPro.xcodeproj \
                   -scheme InksyncPro \
                   -sdk iphoneos \
                   -configuration Release \
                   -derivedDataPath build \
                   clean
        xcodebuild -project InksyncPro.xcodeproj \
                   -scheme InksyncPro \
                   -sdk iphoneos \
                   -configuration Release \
                   -derivedDataPath build \
                   build \
                   CODE_SIGN_IDENTITY="" \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGNING_ALLOWED=NO

    - name: Package IPA
      run: |
        cd ComicToPDF
        mkdir Payload
        cp -r build/Build/Products/Release-iphoneos/InksyncPro.app Payload/
        zip -r InksyncPro_Unsigned.ipa Payload

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: InksyncPro_Unsigned_IPA
        path: ComicToPDF/InksyncPro_Unsigned.ipa
