name: Build Desktop Windows Companion

on:
  push:
    branches: [ "beta", "main" ]
  pull_request:
    branches: [ "beta", "main" ]

jobs:
  build-tauri:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Rust Stable
      uses: dtolnay/rust-toolchain@stable

    - name: Rust Cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: "./InksyncDesktop/src-tauri -> target"

    - name: Install Frontend Dependencies
      run: |
        cd InksyncDesktop
        npm install

    - name: Build Tauri Desktop App
      run: |
        cd InksyncDesktop
        npm run tauri build

    - name: Upload Windows MSI Installer
      uses: actions/upload-artifact@v4
      with:
        name: InksyncDesktop_Windows_MSI
        path: InksyncDesktop/src-tauri/target/release/bundle/msi/*.msi

    - name: Upload Windows EXE Binary
      uses: actions/upload-artifact@v4
      with:
        name: InksyncDesktop_Windows_EXE
        path: InksyncDesktop/src-tauri/target/release/InksyncDesktop.exe
