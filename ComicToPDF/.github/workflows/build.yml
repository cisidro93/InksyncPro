name: Build Native iOS App

on:
  push:
    branches: [ "ios-port" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Project
      run: |
        cd ComicToPDF
        xcodegen generate
        ls -R ComicToPDF.xcodeproj

    - name: Build Archive
      run: |
        cd ComicToPDF
        xcodebuild -project ComicToPDF.xcodeproj \
                   -scheme ComicToPDF \
                   -sdk iphoneos \
                   -configuration Release \
                   -archivePath $PWD/build/ComicToPDF.xcarchive \
                   clean archive \
                   CODE_SIGN_IDENTITY="" \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGNING_ALLOWED=NO

    - name: Export IPA
      run: |
        cd ComicToPDF
        mkdir -p build/Payload
        cp -r build/ComicToPDF.xcarchive/Products/Applications/ComicToPDF.app build/Payload/
        cd build
        zip -r ComicToPDF.ipa Payload

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ComicToPDF_Native_Build
        path: ComicToPDF/build/ComicToPDF.ipa
