name: ComicToPDF
options:
  bundleIdPrefix: com.antigravity
  deploymentTarget:
    iOS: "16.0"
targets:
  ComicToPDF:
    type: application
    platform: iOS
    sources:
      - path: ComicToPDF
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.antigravity.ComicToPDF
        INFOPLIST_FILE: ComicToPDF/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        Input_File_Path: $(SRCROOT)/ComicToPDF/Info.plist
    info:
      path: ComicToPDF/Info.plist
      properties:
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
