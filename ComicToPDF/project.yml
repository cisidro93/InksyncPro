name: InksyncPro
options:
  bundleIdPrefix: com.antigravity
  deploymentTarget:
    iOS: "17.0"
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: 0.9.19
  UnrarKit:
    url: https://github.com/abbeycode/UnrarKit.git
    branch: v2.11
targets:
  InksyncPro:
    type: application
    platform: iOS
    sources:
      - path: ComicToPDF

    dependencies:
      - package: ZIPFoundation
      - package: UnrarKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.antigravity.InksyncPro
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
        INFOPLIST_FILE: ComicToPDF/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        Input_File_Path: $(SRCROOT)/ComicToPDF/Info.plist
    info:
      path: ComicToPDF/Info.plist
      properties:
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        UILaunchStoryboardName: LaunchScreen
        UIRequiresFullScreen: true
