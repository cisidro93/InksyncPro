name: InksyncPro
options:
  bundleIdPrefix: com.antigravity
  deploymentTarget:
    iOS: "17.0"
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: 0.9.19
  Unrar:
    url: https://github.com/mtgto/Unrar.swift.git
    from: 0.5.2

targets:
  InksyncPro:
    type: application
    platform: iOS
    sources:
      - path: ComicToPDF
        excludes:
          - "**/*.md"
          - "**/*.txt"
          - "reference files/**"

    dependencies:
      - package: ZIPFoundation
      - package: Unrar

    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.antigravity.InksyncPro
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
        INFOPLIST_FILE: ComicToPDF/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        Input_File_Path: $(SRCROOT)/ComicToPDF/Info.plist
    info:
      path: ComicToPDF/Info.plist
      properties:
        CFBundleVersion: "2"
        CFBundleShortVersionString: "1.0.1"
        UILaunchStoryboardName: LaunchScreen
        UIRequiresFullScreen: true
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UIBackgroundModes: [audio]
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: public.comma-separated-values-text
            UTTypeDescription: CSV File
            UTTypeConformsTo: [public.text]
            UTTypeTagSpecification:
              public.filename-extension: [csv]
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeDescription: Markdown Document
            UTTypeConformsTo: [public.text]
            UTTypeTagSpecification:
              public.filename-extension: [md, markdown]
          - UTTypeIdentifier: com.macromates.textpad.snippet
            UTTypeDescription: Text File
            UTTypeConformsTo: [public.text]
            UTTypeTagSpecification:
              public.filename-extension: [txt]
          - UTTypeIdentifier: com.antigravity.cbz-archive
            UTTypeDescription: Comic Book Archive
            UTTypeConformsTo: [public.zip-archive]
            UTTypeTagSpecification:
              public.filename-extension: [cbz]
          - UTTypeIdentifier: com.antigravity.cbr-archive
            UTTypeDescription: Comic Book RAR Archive
            UTTypeConformsTo: [public.archive]
            UTTypeTagSpecification:
              public.filename-extension: [cbr]
          - UTTypeIdentifier: com.antigravity.cbt-archive
            UTTypeDescription: Comic Book TAR Archive
            UTTypeConformsTo: [public.tar-archive]
            UTTypeTagSpecification:
              public.filename-extension: [cbt]
